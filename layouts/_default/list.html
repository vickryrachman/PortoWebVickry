{{ define "main" }}
  <div class="mx-auto flex w-full max-w-250 grow flex-col p-6 lg:px-8">
    <ul
      class="mx-auto grid w-full grid-cols-1 gap-x-4 gap-y-6 md:grid-cols-2 lg:grid-cols-3">
      {{ if and .Title .Content }}
        <div
          class="col-span-1 mb-5 flex max-w-full flex-col md:col-span-2 lg:col-span-3">
          <div
            class="flex items-center justify-start space-x-2 text-gray-800 dark:text-gray-400">
             {{ if not .Params.disableImg }}
              <img
                src="{{ "images/fotoprofile.jpeg" | relURL }}"
                alt="Foto Profil"
                class="size-14 rounded-full object-cover" />
            {{ end }}
            <p class="hs-instruction-title text-2xl font-bold">{{ .Title }}</p>
          </div>

          <div
            class="hs-instruction format py-5 dark:format-invert format-a:text-[--hs-text-color-hover] dark:text-gray-400">
            {{ .Content }}
          </div>
          <span
            class="h-px w-full max-w-4xl bg-gray-300 dark:bg-gray-600"></span>
        </div>
      {{ end }}
      {{ range .Paginator.Pages }}
        {{ partial "li_page.html" . }}
      {{ end }}
    </ul>
    {{ partial "pagination.html" . }}
  </div>
{{ end }}
