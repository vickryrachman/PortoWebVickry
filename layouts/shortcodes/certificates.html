{{ $items := .Site.Data.certificates }}
<div class="not-format my-8 grid grid-cols-1 gap-4 sm:grid-cols-2">
  {{ range $items }}
    <a href="{{ .url }}" target="_blank" rel="noopener"
      class="group flex flex-col justify-between gap-2 rounded-md bg-white/50 p-5 shadow-[0_7px_29px_0_rgba(100,100,111,0.15)] backdrop-blur-md transition hover:shadow-[0_7px_29px_0_rgba(100,100,111,0.3)] dark:bg-gray-800/70 dark:shadow-[0_5px_15px_rgba(0,0,0,0.35)]">
      <div class="flex items-start justify-between gap-2">
        <p class="text-base font-bold text-gray-900 group-hover:text-[--hs-text-color-hover] dark:text-gray-200 dark:group-hover:text-[--hs-text-color-hover-dark]">
          {{ .name }}
        </p>
        <svg class="size-4 shrink-0 text-gray-400 transition group-hover:text-[--hs-text-color-hover] dark:text-gray-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
        </svg>
      </div>
      <p class="text-sm text-gray-500 dark:text-gray-500">{{ .issuer }}</p>
      <p class="text-xs text-gray-400 dark:text-gray-600">{{ .date }}</p>
    </a>
  {{ end }}
</div>
